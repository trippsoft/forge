syntax = "proto3";

package result;

option go_package = "github.com/trippsoft/forge/pkg/result";

message ModuleFailure {
    string error = 1;
    string detail = 2;
}

message ModuleSuccess {
    bool changed = 1;
    bytes output = 2;    
}

message ModuleResult {
    oneof result {
        ModuleFailure failure = 1;
        ModuleSuccess success = 2;
    }

    repeated string warnings = 3;
    repeated string messages = 4;
}
